<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- KyberStation favicon — Kyber Crystal hexagonal prism (Form 1: Natural).
       Faceted silhouette tuned to read at 16×16: tapered hex prism, two visible
       side facets split by a glowing core column, deep-space background. -->
  <defs>
    <!-- Left facet: darker shade for 3D illusion. -->
    <linearGradient id="facetL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a4a7a"/>
      <stop offset="1" stop-color="#2e78c4"/>
    </linearGradient>
    <!-- Right facet: lighter shade. -->
    <linearGradient id="facetR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3d8de0"/>
      <stop offset="1" stop-color="#1a4a7a"/>
    </linearGradient>
    <!-- Glowing core column. -->
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8d8ff" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a8d8ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a10"/>
  <!-- Outer halo glow -->
  <path d="M16 4 L26 9 L26 23 L16 28 L6 23 L6 9 Z" fill="#4A9EFF" fill-opacity="0.12"/>
  <!-- Hex prism — left facet -->
  <path d="M16 5 L16 27 L7 22 L7 10 Z" fill="url(#facetL)"/>
  <!-- Hex prism — right facet -->
  <path d="M16 5 L25 10 L25 22 L16 27 Z" fill="url(#facetR)"/>
  <!-- Top tapered cap (lighter, catches light) -->
  <path d="M16 5 L25 10 L7 10 Z" fill="#5EC3FF" fill-opacity="0.75"/>
  <!-- Bottom tapered cap -->
  <path d="M16 27 L25 22 L7 22 Z" fill="#1a4a7a" fill-opacity="0.85"/>
  <!-- Facet edge strokes -->
  <path d="M16 5 L7 10 L7 22 L16 27 L25 22 L25 10 Z" fill="none" stroke="#5EC3FF" stroke-width="0.5" stroke-opacity="0.55" stroke-linejoin="round"/>
  <!-- Glowing core column (the kyber heart) -->
  <rect x="15" y="9" width="2" height="14" rx="1" fill="url(#core)"/>
  <!-- Bright core spark -->
  <circle cx="16" cy="16" r="1.6" fill="#ffffff"/>
  <circle cx="16" cy="16" r="2.6" fill="#ffffff" fill-opacity="0.32"/>
</svg>
