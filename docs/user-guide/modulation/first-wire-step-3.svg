<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img" aria-labelledby="title-3 desc-3">
  <title id="title-3">Step 3 — Wired from SWING plate to Shimmer knob</title>
  <desc id="desc-3">A wider view with the LayerStack on the left showing the armed SWING plate, an Inspector panel on the right with a Shimmer slider, and an animated blue wire connecting them. The Shimmer label is tinted the same swing-blue. The shimmer slider thumb pulses slightly to convey live modulation.</desc>

  <rect width="720" height="260" fill="#0a0a10"/>

  <!-- LEFT COLUMN: LayerStack (compact) -->
  <g>
    <text x="20" y="28" fill="#94a0b3" font-family="system-ui, sans-serif" font-size="11" letter-spacing="1.5" font-weight="600">MODULATORS</text>
    <rect x="20" y="32" width="260" height="1" fill="#2a2d36"/>

    <!-- SWING plate (compact, armed style with glow) -->
    <rect x="14" y="44" width="130" height="122" rx="10" fill="#409cff" opacity="0.08"/>
    <rect x="20" y="50" width="116" height="110" rx="6" fill="#14141e" stroke="#409cff" stroke-width="1.5"/>
    <rect x="20" y="50" width="4" height="110" fill="#409cff"/>
    <text x="32" y="74" fill="#409cff" font-family="ui-monospace, monospace" font-size="11" font-weight="600">SWING</text>
    <circle cx="128" cy="58" r="3" fill="#409cff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="0.9s" repeatCount="indefinite"/>
    </circle>
    <rect x="32" y="90" width="92" height="48" rx="3" fill="#0a0a10" stroke="#409cff" stroke-width="1" opacity="0.7"/>
    <rect x="36" y="108" width="12" height="12" fill="#409cff" rx="2">
      <animate attributeName="x" values="36;104;36" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Other plates compacted as hints -->
    <g opacity="0.3" font-family="ui-monospace, monospace" font-size="9">
      <rect x="156" y="50" width="48" height="30" rx="4" fill="#14141e" stroke="#2a2d36"/>
      <rect x="156" y="50" width="2" height="30" fill="#2dd4bf"/>
      <text x="162" y="68" fill="#2dd4bf">ANGLE</text>

      <rect x="212" y="50" width="48" height="30" rx="4" fill="#14141e" stroke="#2a2d36"/>
      <rect x="212" y="50" width="2" height="30" fill="#e879f9"/>
      <text x="218" y="68" fill="#e879f9">SOUND</text>

      <rect x="156" y="88" width="48" height="30" rx="4" fill="#14141e" stroke="#2a2d36"/>
      <rect x="156" y="88" width="2" height="30" fill="#fbbf24"/>
      <text x="162" y="106" fill="#fbbf24">TIME</text>

      <rect x="212" y="88" width="48" height="30" rx="4" fill="#14141e" stroke="#2a2d36"/>
      <rect x="212" y="88" width="2" height="30" fill="#f8fafc"/>
      <text x="220" y="106" fill="#f8fafc">CLASH</text>
    </g>
  </g>

  <!-- DIVIDER -->
  <line x1="360" y1="28" x2="360" y2="230" stroke="#2a2d36" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- RIGHT COLUMN: Inspector Shimmer slider -->
  <g>
    <text x="400" y="28" fill="#94a0b3" font-family="system-ui, sans-serif" font-size="11" letter-spacing="1.5" font-weight="600">INSPECTOR · TUNE</text>
    <rect x="400" y="32" width="300" height="1" fill="#2a2d36"/>

    <!-- Shimmer row with left-edge bound stripe in swing-blue -->
    <g transform="translate(400 58)">
      <rect x="0" y="0" width="300" height="36" rx="3" fill="#0f0f18" stroke="#2a2d36"/>
      <!-- BOUND accent stripe, left-edge -->
      <rect x="0" y="0" width="2" height="36" fill="#409cff"/>
      <!-- Label tinted swing-blue (HOVERED state) -->
      <text x="14" y="22" fill="#409cff" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Shimmer</text>
      <!-- Slider track -->
      <rect x="92" y="16" width="160" height="4" rx="2" fill="#2a2d36"/>
      <rect x="92" y="16" width="70" height="4" rx="2" fill="#409cff">
        <animate attributeName="width" values="56;96;66;86;56" dur="1.6s" repeatCount="indefinite" keyTimes="0;0.25;0.5;0.75;1"/>
      </rect>
      <!-- Slider thumb (pulses) -->
      <circle cx="162" cy="18" r="6" fill="#409cff" stroke="#0f0f18" stroke-width="2">
        <animate attributeName="cx" values="148;188;158;178;148" dur="1.6s" repeatCount="indefinite" keyTimes="0;0.25;0.5;0.75;1"/>
      </circle>
      <!-- Value readout -->
      <text x="270" y="22" fill="#94a0b3" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">
        <animate attributeName="x" values="270;270;270;270;270" dur="1.6s" repeatCount="indefinite"/>
      </text>
      <text x="284" y="22" fill="#94a0b3" font-family="ui-monospace, monospace" font-size="10" text-anchor="end">35%</text>
      <!-- fx button -->
      <g transform="translate(292 8)">
        <rect x="-10" y="0" width="18" height="20" rx="3" fill="none" stroke="#2a2d36"/>
        <text x="-1" y="14" fill="#94a0b3" font-family="ui-monospace, monospace" font-size="8" font-weight="700" letter-spacing="1">fx</text>
      </g>
    </g>

    <!-- Active Bindings section below -->
    <text x="400" y="120" fill="#94a0b3" font-family="system-ui, sans-serif" font-size="11" letter-spacing="1.5" font-weight="600">ACTIVE BINDINGS</text>
    <rect x="400" y="124" width="300" height="1" fill="#2a2d36"/>
    <g transform="translate(400 140)">
      <rect x="0" y="0" width="300" height="30" rx="3" fill="#14141e" stroke="#2a2d36" stroke-width="1"/>
      <rect x="0" y="0" width="3" height="30" fill="#409cff"/>
      <text x="10" y="20" fill="#409cff" font-family="ui-monospace, monospace" font-size="10" font-weight="600">SWING</text>
      <text x="56" y="20" fill="#6e7382" font-family="ui-monospace, monospace" font-size="10">→</text>
      <text x="72" y="20" fill="#d0d4dc" font-family="system-ui, sans-serif" font-size="11">Shimmer</text>
      <text x="176" y="20" fill="#94a0b3" font-family="ui-monospace, monospace" font-size="9" letter-spacing="1">add</text>
      <text x="236" y="20" fill="#94a0b3" font-family="ui-monospace, monospace" font-size="10" text-anchor="end">60%</text>
      <!-- bypass/remove stubs -->
      <text x="260" y="20" fill="#94a0b3" font-family="ui-monospace, monospace" font-size="11">▶</text>
      <text x="282" y="20" fill="#94a0b3" font-family="ui-monospace, monospace" font-size="13">×</text>
    </g>
  </g>

  <!-- ANIMATED WIRE — from SWING plate bottom-right edge to Shimmer label -->
  <!-- Start: ~(136, 110) end: (400, 76). Use a cubic bezier + dashed animation. -->
  <g>
    <path
      d="M 136 108 C 220 108, 320 76, 400 76"
      fill="none"
      stroke="#409cff"
      stroke-width="2"
      stroke-linecap="round"
      stroke-dasharray="6 4"
      opacity="0.85"
    >
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <!-- traveling pulse dot along the wire -->
    <circle r="3" fill="#409cff">
      <animateMotion dur="1.6s" repeatCount="indefinite">
        <mpath href="#wire-path"/>
      </animateMotion>
    </circle>
    <path id="wire-path" d="M 136 108 C 220 108, 320 76, 400 76" fill="none" stroke="none"/>
  </g>

  <!-- Bottom hint -->
  <text x="360" y="250" fill="#6e7382" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" font-style="italic">Wave the saber → Shimmer rises.  Hold still → Shimmer settles.</text>
</svg>
