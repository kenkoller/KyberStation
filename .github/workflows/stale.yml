name: Stale Issues & PRs

on:
  schedule:
    - cron: '30 1 * * *' # Daily at 1:30 UTC
  workflow_dispatch: # Manual trigger

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in the last 60 days. It will be closed in 14 days if no further
            activity occurs. If this is still relevant, leave a comment or remove the
            stale label.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            activity in the last 60 days. It will be closed in 14 days if no further
            activity occurs.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with no activity.
            Feel free to reopen if this is still relevant.
          close-pr-message: >
            This PR was closed because it has been stale for 14 days with no activity.
            Feel free to reopen if you'd like to continue working on it.
          exempt-issue-labels: pinned,security,good first issue
          exempt-pr-labels: pinned,work-in-progress
          exempt-all-milestones: true
