name: Card Snapshot (macOS)

# Card-snapshot regression coverage for the saber-card pipeline. Cairo
# (Linux, on the main `ci.yml` job) and Core Graphics (macOS, here)
# rasterize text differently — coarse hashing + region masking didn't
# produce a cross-platform-stable hash (PR #147 + PR #217 + research
# in PR #223). The recommended path is platform-specific golden files,
# committed under `apps/web/tests/cardSnapshotGoldenHash/__snapshots__/`
# as `cardSnapshot.<platform>.test.ts.snap`.
#
# This workflow runs the cardSnapshot test on macOS to assert against
# the darwin snapshot. Triggers only when card-snapshot infrastructure
# changes, keeping macOS minutes (which cost ~10× Linux on GitHub
# Actions) low for an OSS hobby project.
#
# To regenerate snapshots after intentional pipeline changes:
#   1. Pull latest, run `pnpm test -- -u tests/cardSnapshotGoldenHash`
#      locally on macOS (this writes cardSnapshot.darwin.test.ts.snap).
#   2. Push the change. The Linux snapshot is regenerated by
#      workflow_dispatch on `ci.yml` (use `update_snapshots: true`).
#   3. Both platforms must have green CI before merge.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/tests/cardSnapshotGoldenHash/**'
      - 'apps/web/lib/sharePack/**'
      - 'apps/web/lib/crystal/qrSurface.ts'
      - 'apps/web/components/hilt/HiltRenderer.tsx'
      - 'apps/web/lib/hilts/**'
      - 'apps/web/vitest.config.ts'
      - '.github/workflows/card-snapshot-macos.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/tests/cardSnapshotGoldenHash/**'
      - 'apps/web/lib/sharePack/**'
      - 'apps/web/lib/crystal/qrSurface.ts'
      - 'apps/web/components/hilt/HiltRenderer.tsx'
      - 'apps/web/lib/hilts/**'
      - 'apps/web/vitest.config.ts'
      - '.github/workflows/card-snapshot-macos.yml'
  # Manual trigger for snapshot regeneration. Set update_snapshots:
  # 'true' to run with `-u` and upload the regenerated darwin snap as
  # a build artifact for download/commit.
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Run with -u to regenerate cardSnapshot.darwin.test.ts.snap'
        type: boolean
        default: false

jobs:
  card-snapshot-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Validate (default): run the matrix against committed darwin
      # snapshots. Fails on hash mismatch.
      - name: Run card snapshot tests
        if: ${{ inputs.update_snapshots != true }}
        run: pnpm --filter @kyberstation/web test -- tests/cardSnapshotGoldenHash

      # Bootstrap / regen: run with -u and upload the snap files. Use
      # workflow_dispatch with update_snapshots: true. Download the
      # artifact, commit cardSnapshot.darwin.test.ts.snap, push.
      - name: Regenerate card snapshot files
        if: ${{ inputs.update_snapshots == true }}
        run: pnpm --filter @kyberstation/web test -- -u tests/cardSnapshotGoldenHash

      - name: Upload regenerated snapshot
        if: ${{ inputs.update_snapshots == true }}
        uses: actions/upload-artifact@v4
        with:
          name: cardSnapshot-darwin-snap
          path: apps/web/tests/cardSnapshotGoldenHash/__snapshots__/cardSnapshot.darwin.test.ts.snap
          if-no-files-found: error
